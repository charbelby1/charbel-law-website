<div class="section">

  <div class="card">

    <h2>Contact Us</h2>

    <img
      src="charbel profile.jpeg"
      alt="Lawyer Charbel Bou Younes"
      style="max-width:250px;width:100%;border-radius:10px;margin-bottom:20px;"
    >

    <p><strong>Lawyer Charbel Bou Younes</strong></p>

    <p>Beirut Bar Association</p>

    <p>Phone / WhatsApp: +961 76 341 528</p>

    <form action="https://formspree.io/f/mjgdpnzn" method="POST">

      <p>
        <input
          type="text"
          name="name"
          placeholder="Your Name"
          required
          style="width:100%;padding:12px;margin-bottom:15px;"
        >
      </p>

      <p>
        <input
          type="email"
          name="email"
          placeholder="Your Email"
          required
          style="width:100%;padding:12px;margin-bottom:15px;"
        >
      </p>

      <p>
        <textarea
          name="message"
          placeholder="Your Message"
          rows="6"
          required
          style="width:100%;padding:12px;margin-bottom:15px;"
        ></textarea>
      </p>

      <button class="btn" type="submit">
        Send Message
      </button>

    </form>

  </div>

</div>
